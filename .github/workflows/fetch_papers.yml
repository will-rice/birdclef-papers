name: Fetch BirdCLEF Papers

on:
  # Run every day at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      full:
        description: "Run a full historical fetch (since 2016)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  # Temporary: bootstrap full historical fetch on PR branch push
  push:
    branches:
      - copilot/collect-birdclef-papers
    paths:
      - ".github/workflows/fetch_papers.yml"
      - "scripts/fetch_papers.py"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch papers (incremental)
        if: ${{ github.event_name != 'push' && github.event.inputs.full != 'true' }}
        run: python scripts/fetch_papers.py --days 3

      - name: Fetch papers (full historical)
        if: ${{ github.event_name == 'push' || github.event.inputs.full == 'true' }}
        run: python scripts/fetch_papers.py --full

      - name: Commit updated paper list
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update papers list [skip ci]"
          file_pattern: "papers.csv README.md"
